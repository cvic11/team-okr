<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>팀 OKR · 일일 스프린트 (v2)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root{--primary:#6241F5;--primary-soft:#EEEAFE;--growth:#30AB62;--growth-soft:#E6F6EE;--warning:#E5484D;--warning-soft:#FCE8E9;--amber:#F59E0B;--amber-soft:#FFF4E5;--text:#262626;--text-soft:#737373;--line:#EAEAEA;--bg:#FAFAFA;--card:#FFFFFF;}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
body.present{font-size:17px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
header.app-header{position:sticky;top:0;z-index:20;background:rgba(250,250,250,0.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hdr-inner{max-width:1200px;margin:0 auto;min-height:64px;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
main{max-width:1200px;margin:0 auto;padding:28px 24px}
body.present main{padding:20px}
footer.app-footer{max-width:1200px;margin:0 auto;padding:8px 24px 24px;font-size:12px;color:var(--text-soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 6px;border-radius:10px;transition:background .15s}
.brand:hover{background:#F4F4F5}
.brand-mark{width:34px;height:34px;border-radius:10px;color:white;display:grid;place-items:center;font-weight:800;font-size:15px;letter-spacing:-0.5px;flex-shrink:0}
.brand-meta{line-height:1.2;min-width:0}
.brand-title{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px}
.brand-sub{font-size:11px;color:var(--text-soft);margin-top:1px}
.team-switch{font-size:11px;color:var(--text-soft);padding:1px 5px;border-radius:5px;border:1px solid var(--line);transition:all .15s}
.team-switch:hover{border-color:var(--primary);color:var(--primary)}
.team-menu{position:absolute;top:62px;left:24px;background:white;border:1px solid var(--line);border-radius:12px;padding:6px;min-width:240px;box-shadow:0 8px 24px rgba(0,0,0,.08);z-index:30;display:none}
.team-menu.show{display:block}
.team-menu-item{padding:8px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13.5px}
.team-menu-item:hover{background:#F4F4F5}
.team-menu-item.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
.team-menu-divider{height:1px;background:var(--line);margin:4px 0}
.team-menu-add{padding:8px 12px;border-radius:8px;cursor:pointer;color:var(--primary);font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
.team-menu-add:hover{background:var(--primary-soft)}
.tabs{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.tab{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:500;transition:all .15s;color:var(--text)}
.tab:hover{background:#F4F4F5}
.tab.active{background:var(--primary);color:white;font-weight:600}
.tab-divider{width:1px;height:18px;background:var(--line);margin:0 4px}
.btn-mode{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;color:var(--text-soft);font-size:12px;font-weight:500;transition:all .15s}
.btn-mode:hover{background:#F4F4F5}
.conn-dot{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600}
.conn-dot.online{background:var(--growth-soft);color:var(--growth)}
.conn-dot.offline{background:var(--warning-soft);color:var(--warning)}
.conn-dot.connecting{background:var(--amber-soft);color:var(--amber)}
.conn-dot::before{content:'';width:6px;height:6px;border-radius:999px;background:currentColor}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.conn-dot.connecting::before{animation:pulse 1.2s ease-in-out infinite}
.sync-toast{position:fixed;bottom:24px;right:24px;padding:9px 14px;border-radius:999px;font-size:12px;font-weight:600;background:var(--primary);color:white;box-shadow:0 4px 16px rgba(0,0,0,.12);opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
.sync-toast.show{opacity:1}
.sync-toast.error{background:var(--warning)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px}
.card+.card{margin-top:14px}
.card-section{margin-top:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:500;transition:all .15s;border:none}
.btn:hover{filter:brightness(.97)}
.btn-primary{background:var(--primary);color:white;font-weight:600}
.btn-soft{background:var(--primary-soft);color:var(--primary);font-weight:600}
.btn-ghost{background:#F4F4F5;color:var(--text)}
.btn-danger{background:var(--warning-soft);color:var(--warning);font-weight:600}
.btn-icon{padding:6px;color:var(--text-soft);border-radius:6px}
.btn-icon:hover{background:#F4F4F5}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.section-title{font-weight:700;font-size:14px;letter-spacing:-0.3px}
.section-meta{font-size:12px;color:var(--text-soft)}
.date-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.date-nav-btn{width:32px;height:32px;border-radius:8px;background:white;border:1px solid var(--line);display:grid;place-items:center;color:var(--text-soft);transition:all .15s}
.date-nav-btn:hover{border-color:var(--primary);color:var(--primary)}
.date-input{padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:white;font-size:13px;outline:none;color:var(--text);font-weight:600}
.today-tag{font-size:11px;padding:3px 8px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-weight:700}
.past-tag{font-size:11px;padding:3px 8px;border-radius:999px;background:#F4F4F5;color:var(--text-soft);font-weight:600}
.headline-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;color:var(--text-soft);font-size:13px}
.headline-input{width:100%;border:none;background:transparent;outline:none;resize:none;font-size:21px;font-weight:700;letter-spacing:-0.5px;line-height:1.4;color:var(--text);padding:0;font-family:inherit}
.headline-input::placeholder{color:#BBB}
body.present .headline-input{font-size:26px}
.stat-row{display:flex;align-items:center;gap:24px;padding-top:14px;border-top:1px solid var(--line);margin-top:14px;flex-wrap:wrap}
.stat-label{font-size:11px;color:var(--text-soft);margin-bottom:2px;font-weight:500}
.stat-value{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.stat-divider{width:1px;height:28px;background:var(--line)}
.progress-track{height:6px;background:#F4F4F5;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;transition:width 400ms ease,background 200ms ease}
.kr-strip-row{margin-bottom:11px}
.kr-strip-row:last-child{margin-bottom:0}
.kr-strip-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:8px}
.kr-strip-title{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kr-strip-owner{font-size:11px;padding:1px 7px;border-radius:999px;background:#F4F4F5;color:var(--text-soft);flex-shrink:0}
.kr-strip-meta{display:flex;align-items:center;gap:10px;flex-shrink:0}
.kr-strip-num{font-size:12px;color:var(--text-soft)}
.kr-strip-pct{font-size:12px;font-weight:700;min-width:38px;text-align:right}
.member-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.member-card{background:white;border:1px solid var(--line);border-radius:12px;padding:18px;transition:all .2s;position:relative}
.member-card.has-blocker{border-color:#F5C2C5;box-shadow:0 0 0 3px rgba(229,72,77,.06)}
.member-card.remote-edit::after{content:'';position:absolute;inset:0;border-radius:12px;border:2px solid var(--primary);pointer-events:none;animation:flash 1.4s ease-out forwards}
@keyframes flash{0%{opacity:.7}100%{opacity:0}}
.member-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.avatar{width:30px;height:30px;border-radius:999px;display:grid;place-items:center;color:white;font-weight:700;font-size:12px;flex-shrink:0}
.member-name{font-weight:700;font-size:14px;line-height:1.2}
.member-role{font-size:11px;color:var(--text-soft);line-height:1.2;margin-top:1px}
.blocker-badge{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:10.5px;padding:3px 7px;border-radius:999px;background:var(--warning-soft);color:var(--warning);font-weight:700}
.field{margin-bottom:11px}
.field:last-child{margin-bottom:0}
.field-label{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.field-dot{width:4px;height:4px;border-radius:999px;display:inline-block;background:var(--text-soft)}
.field-name{font-size:11px;font-weight:600;color:var(--text-soft);letter-spacing:.2px}
.field-name.accent-primary{color:var(--primary)}
.field-name.accent-warning{color:var(--warning)}
.field-dot.accent-primary{background:var(--primary)}
.field-dot.accent-warning{background:var(--warning)}
.field-input{width:100%;resize:none;padding:8px;border:1px solid transparent;border-radius:6px;background:#FAFAFA;outline:none;font-size:13px;line-height:1.5;font-family:inherit;transition:border-color .15s}
.field-input:focus{border-color:var(--primary);background:white}
body.present .field-input{font-size:14.5px}
.obj-card{background:white;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.obj-card+.obj-card{margin-top:11px}
.obj-head{padding:18px 22px;display:flex;align-items:flex-start;gap:10px}
.obj-toggle{margin-top:3px;color:var(--text-soft)}
.obj-body{flex:1;min-width:0}
.obj-tags{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.tag-id{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-weight:700}
.tag-owner{font-size:11px;padding:2px 8px;border-radius:999px;background:#F4F4F5;color:var(--text-soft);border:none;outline:none;cursor:pointer;font-family:inherit}
.obj-title-input{width:100%;outline:none;background:transparent;border:none;font-size:16.5px;font-weight:700;letter-spacing:-0.4px;padding:3px 0;font-family:inherit;color:var(--text)}
.obj-desc-input{width:100%;outline:none;background:transparent;border:none;font-size:12.5px;color:var(--text-soft);margin-top:2px;padding:0;font-family:inherit}
.obj-avg-wrap{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.obj-avg-label{font-size:11px;color:var(--text-soft)}
.obj-avg{font-size:19px;font-weight:800;letter-spacing:-0.5px;line-height:1.1}
.obj-actions{display:flex;align-items:center;gap:2px;margin-top:2px}
.obj-krs{border-top:1px solid var(--line);background:#FCFCFD}
.kr-row{padding:12px 22px;border-bottom:1px solid var(--line)}
.kr-row:last-child{border-bottom:none}
.kr-row-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.kr-id{font-size:11px;color:var(--text-soft);font-weight:600;min-width:30px}
.kr-title-input{flex:1;min-width:140px;outline:none;background:transparent;border:none;font-size:13.5px;font-weight:500;font-family:inherit;color:var(--text)}
.kr-num-input{width:60px;text-align:right;outline:none;border-radius:6px;font-size:12.5px;padding:4px 7px;background:white;border:1px solid var(--line);font-family:inherit}
.kr-unit-input{width:50px;outline:none;border-radius:6px;font-size:12px;padding:4px 7px;background:white;border:1px solid var(--line);font-family:inherit}
.kr-due-input{outline:none;border-radius:6px;font-size:11.5px;padding:4px 7px;background:white;border:1px solid var(--line);font-family:inherit;color:var(--text-soft)}
.kr-owner-select{font-size:11px;padding:3px 8px;border-radius:999px;background:white;color:var(--text-soft);border:1px solid var(--line);outline:none;font-family:inherit}
.kr-pct{font-size:12.5px;font-weight:700;min-width:40px;text-align:right}
.kr-bar-wrap{margin-top:8px}
.kr-bar-track{height:4px;background:#F4F4F5;border-radius:999px;overflow:hidden}
.add-line{padding:10px 22px;background:#FCFCFD;border-top:1px solid var(--line);display:flex;gap:8px}
.init-list{margin:8px 0 0 38px;border-left:2px dashed #E5E7EB;padding-left:14px}
.init-row{padding:8px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.init-row+.init-row{border-top:1px solid #F4F4F5}
.init-status{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--line);outline:none;font-family:inherit;cursor:pointer}
.init-status.todo{background:#F4F4F5;color:var(--text-soft)}
.init-status.doing{background:var(--primary-soft);color:var(--primary)}
.init-status.done{background:var(--growth-soft);color:var(--growth)}
.init-status.blocked{background:var(--warning-soft);color:var(--warning)}
.init-title-input{flex:1;min-width:120px;outline:none;background:transparent;border:none;font-size:12.5px;font-family:inherit}
.init-due{font-size:11px;color:var(--text-soft);padding:2px 6px;border-radius:5px;border:1px solid var(--line);background:white;outline:none}
.init-due.overdue{color:var(--warning);border-color:#F5C2C5}
.add-init{font-size:11.5px;color:var(--primary);padding:6px 0;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:600}
.conf-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:700;cursor:pointer;border:1px solid transparent;user-select:none}
.conf-chip.high{background:var(--growth-soft);color:var(--growth)}
.conf-chip.mid{background:var(--amber-soft);color:var(--amber)}
.conf-chip.low{background:var(--warning-soft);color:var(--warning)}
.conf-chip::before{content:'';width:6px;height:6px;border-radius:999px;background:currentColor}
.reality-toggle{font-size:11px;color:var(--text-soft);padding:2px 7px;border-radius:5px;cursor:pointer;border:1px solid var(--line);background:white;display:inline-flex;align-items:center;gap:4px}
.reality-toggle:hover{border-color:var(--primary);color:var(--primary)}
.reality-toggle.has-content{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.reality-box{margin-top:8px;padding:10px 12px;background:#FCFCFD;border:1px solid var(--line);border-radius:8px}
.reality-row{display:grid;grid-template-columns:80px 1fr;gap:10px;align-items:start}
.reality-row+.reality-row{margin-top:8px;padding-top:8px;border-top:1px solid #F4F4F5}
.reality-label{font-size:11px;font-weight:700;color:var(--text-soft);padding-top:7px}
.reality-input{width:100%;resize:none;padding:7px 10px;border:1px solid var(--line);border-radius:6px;background:white;font-size:12.5px;font-family:inherit;outline:none;line-height:1.4}
.reality-input:focus{border-color:var(--primary)}
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
.modal-back.show{display:flex}
.modal{background:white;border-radius:16px;max-width:620px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.2)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:700;font-size:15px}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.history-row{padding:10px 0;font-size:12.5px;display:grid;grid-template-columns:90px 1fr;gap:12px;border-bottom:1px solid #F4F4F5}
.history-row:last-child{border-bottom:none}
.history-time{color:var(--text-soft);font-size:11px}
.history-act{font-weight:600}
.history-detail{margin-top:3px;color:var(--text-soft);font-size:11.5px;word-break:break-all}
.history-empty{text-align:center;color:var(--text-soft);padding:24px 0;font-size:13px}
.rt-item{padding:11px 14px;border:1px solid var(--line);border-radius:10px;background:white;display:flex;align-items:center;gap:11px}
.rt-item+.rt-item{margin-top:8px}
.rt-item.done{background:#F8FCF9;border-color:#CCEEDB}
.rt-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);background:white;display:grid;place-items:center;color:white;cursor:pointer;flex-shrink:0;transition:all .15s}
.rt-check:hover{border-color:var(--primary)}
.rt-check.checked{background:var(--growth);border-color:var(--growth)}
.rt-info{flex:1;min-width:0}
.rt-title{font-size:13.5px;font-weight:600;line-height:1.3}
.rt-item.done .rt-title{color:var(--text-soft);text-decoration:line-through}
.rt-meta{font-size:11px;color:var(--text-soft);margin-top:2px}
.rt-note-input{outline:none;border-radius:6px;font-size:12px;padding:5px 8px;background:#FAFAFA;border:1px solid transparent;font-family:inherit;width:200px}
.rt-note-input:focus{border-color:var(--primary);background:white}
.rt-mng-row{padding:11px 14px;border:1px solid var(--line);border-radius:10px;display:grid;grid-template-columns:1fr 110px 90px 32px;gap:8px;align-items:center}
.rt-mng-row+.rt-mng-row{margin-top:8px}
.rt-mng-row.inactive{opacity:.5}
.rt-input{outline:none;padding:6px 9px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;background:white}
.rt-input:focus{border-color:var(--primary)}
.manage-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.labeled-label{font-size:11px;font-weight:600;color:var(--text-soft);margin-bottom:5px;letter-spacing:.2px;display:block}
.labeled-input{width:100%;outline:none;border-radius:6px;padding:8px 11px;border:1px solid var(--line);font-size:13.5px;background:white;font-family:inherit}
.member-row{display:flex;align-items:center;gap:11px;padding:9px;border-radius:9px;background:#FAFAFA}
.member-row+.member-row{margin-top:7px}
.member-color{width:26px;height:26px;border-radius:999px;border:none;cursor:pointer;background:transparent;padding:0}
.member-name-input{outline:none;border-radius:6px;padding:4px 8px;font-size:13px;font-weight:600;background:white;border:1px solid var(--line);width:130px;font-family:inherit}
.member-role-input{outline:none;border-radius:6px;padding:4px 8px;font-size:12.5px;background:white;border:1px solid var(--line);color:var(--text-soft);flex:1;font-family:inherit}
.empty{padding:40px 22px;text-align:center;color:var(--text-soft);background:white;border:1px dashed var(--line);border-radius:14px}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:100}
.loading-spinner{width:30px;height:30px;border:3px solid var(--primary-soft);border-top-color:var(--primary);border-radius:999px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.setup{max-width:520px;margin:60px auto;padding:30px 28px;background:white;border:1px solid var(--line);border-radius:18px}
.setup h1{margin:0 0 6px;font-size:21px;letter-spacing:-0.5px}
.setup .subtitle{color:var(--text-soft);font-size:13.5px;margin-bottom:22px}
.setup .step{padding:13px 15px;background:#FAFAFA;border-radius:10px;margin-bottom:9px;font-size:13px;line-height:1.6}
.setup .step strong{color:var(--primary)}
.setup label{display:block;margin-top:14px}
.setup label .lbl{font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:5px;display:block}
.setup label input{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;outline:none;font-family:'SF Mono',Monaco,Consolas,monospace}
.setup label input:focus{border-color:var(--primary)}
.setup .actions{margin-top:18px;display:flex;gap:8px;align-items:center}
.setup .err{color:var(--warning);font-size:12.5px;margin-top:6px}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.view{animation:fadeIn .25s ease-out}
.perf-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
.perf-card{background:white;border:1px solid var(--line);border-radius:14px;padding:18px}
.perf-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.perf-name{font-weight:700;font-size:15px}
.perf-role{font-size:11px;color:var(--text-soft)}
.perf-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.perf-stat{padding:10px;background:#FAFAFA;border-radius:8px}
.perf-stat-label{font-size:10.5px;color:var(--text-soft);font-weight:500;margin-bottom:2px}
.perf-stat-value{font-size:17px;font-weight:800}
.perf-meta{font-size:11.5px;color:var(--text-soft);margin-bottom:10px;line-height:1.7}
.perf-actions{display:flex;gap:6px;flex-wrap:wrap}
.eval-score{display:flex;gap:6px;margin:8px 0}
.eval-score-btn{width:34px;height:34px;border-radius:8px;border:2px solid var(--line);background:white;font-weight:700;cursor:pointer;font-size:14px;color:var(--text-soft);transition:all .15s}
.eval-score-btn:hover{border-color:var(--primary)}
.eval-score-btn.active{background:var(--primary);border-color:var(--primary);color:white}
.eval-section{margin-top:14px}
.eval-section-label{font-size:12px;font-weight:700;color:var(--text-soft);margin-bottom:5px}
.eval-input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:white;font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:60px;line-height:1.5}
.eval-input:focus{border-color:var(--primary)}
.review-list-item{padding:10px 12px;background:#FAFAFA;border-radius:8px;font-size:12.5px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.review-list-item+.review-list-item{margin-top:6px}
.review-period-tag{font-size:10.5px;padding:2px 7px;border-radius:999px;font-weight:700}
.review-period-tag.mid{background:var(--amber-soft);color:var(--amber)}
.review-period-tag.final{background:var(--primary-soft);color:var(--primary)}
@media (max-width:760px){.manage-grid{grid-template-columns:1fr}.stat-row{gap:14px}main{padding:18px 14px}.reality-row{grid-template-columns:1fr}.rt-mng-row{grid-template-columns:1fr 32px}.perf-stats{grid-template-columns:1fr 1fr}}
@media print{body{background:white}header.app-header,footer.app-footer,.tabs,.btn,.btn-icon,.add-line,.add-init{display:none !important}main{max-width:none;padding:0}.obj-card,.card{break-inside:avoid;page-break-inside:avoid;border:1px solid #999 !important}.conf-chip,.reality-toggle{border:1px solid #999 !important}}
</style>
</head>
<body>
<div id="app"></div>
<div id="sync-toast" class="sync-toast"></div>
<div id="modal-back" class="modal-back"><div class="modal" id="modal"></div></div>
<script src="app.js"></script>
</body>
</html>
